<svg xmlns="http://www.w3.org/2000/svg"
     width="520" height="300" viewBox="0 0 520 300"
     font-family="'Segoe UI',Arial,Helvetica,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0F0F1A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#9B8FFF"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6C63FF"/>
      <stop offset="50%"  stop-color="#FF6584"/>
      <stop offset="100%" stop-color="#9B8FFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <clipPath id="av"><circle cx="68" cy="110" r="38"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="520" height="300" rx="16" fill="url(#bg)"/>

  <!-- Blobs -->
  <circle cx="460" cy="40"  r="80" fill="#6C63FF"  fill-opacity="0.07"/>
  <circle cx="30"  cy="260" r="60" fill="#FF6584"  fill-opacity="0.06"/>
  <circle cx="260" cy="150" r="120" fill="#9B8FFF" fill-opacity="0.03"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="520" height="5" rx="2" fill="url(#acc)"/>

  <!-- Header band -->
  <rect x="0" y="5" width="520" height="58" fill="url(#hdr)" fill-opacity="0.15"/>

  <!-- Bot title -->
  <text x="24" y="43" font-size="26" fill="white">🤖</text>
  <text x="58" y="35" font-size="16" font-weight="700" fill="white">AppX Uploader Bot</text>
  <text x="58" y="53" font-size="10" fill="#9B8FFF" letter-spacing="1.2">ADVANCED DRM BYPASS SYSTEM</text>

  <!-- Role badge -->
  <rect x="396" y="14" width="108" height="24" rx="12" fill="#6C63FF" fill-opacity="0.5"/>
  <text x="450" y="30" font-size="11" fill="white"
        text-anchor="middle" dominant-baseline="middle">👤 Member</text>

  <!-- Divider -->
  <line x1="16" y1="68" x2="504" y2="68" stroke="#6C63FF" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Avatar ring + circle -->
  <circle cx="68" cy="110" r="42" fill="#6C63FF" fill-opacity="0.15" filter="url(#glow)"/>
  <circle cx="68" cy="110" r="39" fill="none" stroke="#6C63FF" stroke-width="2.5"/>
  <circle cx="68" cy="110" r="36" fill="#6C63FF" fill-opacity="0.2"/>
  <text x="68" y="110" font-size="28" font-weight="700" fill="white"
        text-anchor="middle" dominant-baseline="central">⎯</text>

  <!-- Online dot -->
  <circle cx="98" cy="140" r="8" fill="#0F0F1A"/>
  <circle cx="98" cy="140" r="6" fill="#4CAF50"/>

  <!-- User info -->
  <text x="122" y="90"  font-size="19" font-weight="700" fill="white">⎯̽͢𓏲꯭꯭꯭꯭🩵𝐅 ᴜ ɴ ɴ ʏ…</text>
  <text x="122" y="112" font-size="12" fill="#9B8FFF">@funnytamilan</text>
  <text x="122" y="130" font-size="11" fill="#7a7a9a">🆔 8525952693</text>
  <text x="122" y="148" font-size="11" fill="#7a7a9a">📅 Joined 2026-06-03</text>

  <!-- Divider -->
  <line x1="16" y1="168" x2="504" y2="168" stroke="#6C63FF" stroke-width="0.7" stroke-opacity="0.25"/>

  <!-- Stat box 1 — Jobs -->
  <rect x="20"  y="180" width="148" height="70" rx="10" fill="#6C63FF"  fill-opacity="0.1"/>
  <text x="94"  y="210" font-size="24" font-weight="700" fill="#6C63FF"
        text-anchor="middle" dominant-baseline="central">0</text>
  <text x="94"  y="232" font-size="11" fill="#aaa"
        text-anchor="middle">📦 Total Jobs</text>
  <text x="94"  y="246" font-size="9" fill="#555"
        text-anchor="middle">submitted</text>

  <!-- Stat box 2 — Files -->
  <rect x="186" y="180" width="148" height="70" rx="10" fill="#FF6584"  fill-opacity="0.1"/>
  <text x="260" y="210" font-size="24" font-weight="700" fill="#FF6584"
        text-anchor="middle" dominant-baseline="central">0</text>
  <text x="260" y="232" font-size="11" fill="#aaa"
        text-anchor="middle">📄 Files Sent</text>
  <text x="260" y="246" font-size="9" fill="#555"
        text-anchor="middle">downloaded</text>

  <!-- Stat box 3 — Data -->
  <rect x="352" y="180" width="148" height="70" rx="10" fill="#9B8FFF" fill-opacity="0.1"/>
  <text x="426" y="210" font-size="18" font-weight="700" fill="#9B8FFF"
        text-anchor="middle" dominant-baseline="central">0 B</text>
  <text x="426" y="232" font-size="11" fill="#aaa"
        text-anchor="middle">💾 Data Sent</text>
  <text x="426" y="246" font-size="9" fill="#555"
        text-anchor="middle">total volume</text>

  <!-- Bottom bar -->
  <rect x="0" y="295" width="520" height="5" rx="2" fill="url(#acc)"/>
  <text x="260" y="284" font-size="9" fill="#3a3a5a"
        text-anchor="middle">Generated 2026-06-03 · AppX Uploader Bot</text>
</svg>